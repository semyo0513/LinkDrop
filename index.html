<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 모두의 학교 - 링크 포털</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Configuration Script -->
  <script type="module" src="config.js"></script>
</head>
<body>

  <!-- 상단 유틸리티 (다크 모드 & 관리자 모드 토글) -->
  <div class="top-bar">
    <div class="top-buttons">
      <!-- Contact Button -->
      <a class="contact-btn" id="header-contact-btn" href="#" target="_blank" style="display: none;">
        CONTACT
      </a>
      <!-- Admin Button -->
      <button class="theme-toggle-btn" id="admin-btn" aria-label="관리자 설정">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <!-- Dark/Light Theme Toggle -->
      <button class="theme-toggle-btn" id="theme-toggle" aria-label="테마 전환">
        <!-- Sun Icon (Show in Dark Mode) -->
        <svg class="sun-icon" viewBox="0 0 24 24" style="display: none;">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <!-- Moon Icon (Show in Light Mode) -->
        <svg class="moon-icon" viewBox="0 0 24 24">
          <path d="M9.37 5.51c-.18 2.2.48 4.39 1.83 6.13 1.35 1.75 3.3 2.97 5.5 3.42-.58.33-1.22.56-1.89.69-2.07.41-4.21-.1-5.91-1.4-1.7-1.3-2.69-3.31-2.73-5.47-.02-.68.08-1.36.3-2.01.32-.97.9-1.82 1.68-2.47.16.8.52 1.55 1.06 2.18-.55.33-.94.84-1.12 1.44-.22.75-.12 1.56.28 2.23.4.67 1.05 1.15 1.81 1.3 2.27.45 4.54-.78 5.46-2.91.07-.16.12-.33.15-.5.06-.32.06-.65 0-.97-.04-.26-.14-.52-.29-.74.45.67.75 1.43.88 2.22.13.78.07 1.59-.18 2.33-.49 1.48-1.57 2.68-3.01 3.23-1.44.55-3.05.47-4.42-.23-1.37-.7-2.37-1.99-2.74-3.52-.37-1.53-.08-3.14.81-4.46.73-1.07 1.81-1.83 3.05-2.14z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="container">
    <!-- 헤더 -->
    <header>
      <h1 id="app-title">📖 모두의 학교</h1>
      <p id="app-subtitle">자주 사용하는 학급 경영 및 수업 혁신용 웹 링크 모음</p>
    </header>

    <!-- 검색창 -->
    <div class="search-wrapper">
      <input type="text" id="search-bar" class="search-input" placeholder="검색하고 싶은 링크 또는 카테고리를 입력하세요...">
      <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>

    <!-- 카테고리 필터 영역 -->
    <div class="categories" id="category-container">
      <button class="category-tag active" data-category="all">전체</button>
    </div>

    <!-- 로딩/에러 표시창 -->
    <div class="status-container" id="status-area">
      <div class="spinner"></div>
      <p class="status-message">구글 시트에서 데이터를 불러오고 있습니다...</p>
    </div>

    <!-- 링크 카드 그리드 -->
    <div class="links-grid" id="links-grid" style="display: none;">
      <!-- JavaScript를 통해 동적 생성됨 -->
    </div>
  </div>

  <!-- 상세 설명 모달 창 -->
  <div class="modal-overlay" id="info-modal">
    <div class="modal-box">
      <button class="modal-close-btn" id="modal-close" aria-label="닫기">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      
      <div class="modal-favicon-wrapper">
        <img id="modal-favicon" src="" alt="Favicon">
      </div>
      
      <h2 class="modal-title" id="modal-title">링크명</h2>
      <span class="modal-badge" id="modal-category">범주</span>
      
      <div class="modal-description" id="modal-description">
        설명 내용
      </div>
      
      <a class="modal-action-btn" id="modal-link" href="#" target="_blank">
        바로가기
      </a>
    </div>
  </div>

  <!-- 관리자 모드 모달 창 -->
  <div class="modal-overlay" id="admin-modal">
    <div class="modal-box admin-modal-box">
      <button class="modal-close-btn" id="admin-modal-close" aria-label="닫기">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>

      <!-- 1. 패스워드 로그인 화면 -->
      <div id="admin-auth-section" class="admin-section active">
        <h2 class="modal-title">🔐 관리자 로그인</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem;">설정을 변경하려면 관리자 비밀번호를 입력하세요.</p>
        <div style="margin-bottom: 1.5rem;">
          <input type="password" id="admin-password-input" class="admin-input" placeholder="비밀번호 입력 (기본값: 1234)" style="text-align: center;">
          <p id="auth-error-msg" class="error-msg" style="color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none;"></p>
        </div>
        <button class="modal-action-btn" id="admin-login-btn">로그인</button>
      </div>

      <!-- 2. 관리자 설정 대시보드 화면 -->
      <div id="admin-dashboard-section" class="admin-section">
        <h2 class="modal-title" style="margin-bottom: 1rem;">⚙️ 관리자 설정</h2>
        
        <!-- 탭 메뉴 -->
        <div class="admin-tabs">
          <button class="tab-btn active" data-tab="tab-links-list">링크 목록</button>
          <button class="tab-btn" data-tab="tab-add-link">링크 추가</button>
          <button class="tab-btn" data-tab="tab-general-settings">환경 설정</button>
        </div>

        <!-- 탭 1: 링크 목록 -->
        <div id="tab-links-list" class="tab-content active">
          <div class="admin-links-list" id="admin-links-list-container">
            <!-- 자바스크립트로 동적 로드됨 -->
          </div>
        </div>

        <!-- 탭 2: 링크 추가 -->
        <div id="tab-add-link" class="tab-content">
          <form id="add-link-form" onsubmit="event.preventDefault();">
            <div class="form-group">
              <label for="add-category">범주 (카테고리)</label>
              <input type="text" id="add-category" class="admin-input" placeholder="예: 학급경영, 수업혁신" required>
            </div>
            <div class="form-group">
              <label for="add-title">내용 (링크명)</label>
              <input type="text" id="add-title" class="admin-input" placeholder="예: 패들렛, 모두의 선거" required>
            </div>
            <div class="form-group">
              <label for="add-url">링크 URL</label>
              <input type="url" id="add-url" class="admin-input" placeholder="https://..." required>
            </div>
            <div class="form-group">
              <label for="add-desc">링크 설명</label>
              <textarea id="add-desc" class="admin-input" rows="2" placeholder="링크에 대한 간단한 설명을 입력하세요."></textarea>
            </div>
            <div class="form-group">
              <label for="add-icon">커스텀 아이콘 (선택)</label>
              <input type="text" id="add-icon" class="admin-input" placeholder="이모지(예: 📢) 또는 이미지 URL 주소">
            </div>
            <button class="modal-action-btn" id="submit-add-link-btn" style="margin-top: 1rem;">추가하기</button>
          </form>
        </div>

        <!-- 탭 3: 환경 설정 -->
        <div id="tab-general-settings" class="tab-content">
          <form id="general-settings-form" onsubmit="event.preventDefault();">
            <div class="form-group">
              <label for="settings-app-name">웹앱 제목</label>
              <input type="text" id="settings-app-name" class="admin-input" required>
            </div>
            <div class="form-group">
              <label for="settings-bg">배경화면 설정 (이미지 URL 또는 CSS 그라데이션)</label>
              <input type="text" id="settings-bg" class="admin-input" placeholder="URL 주소 또는 linear-gradient(...) 형태">
              <div class="bg-presets" style="margin-top: 0.5rem; display: flex; gap: 0.5rem; justify-content: center;">
                <span class="bg-preset-chip" style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);" data-bg="linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)" title="기본 연회색"></span>
                <span class="bg-preset-chip" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);" data-bg="linear-gradient(135deg, #0f172a 0%, #1e293b 100%)" title="기본 다크"></span>
                <span class="bg-preset-chip" style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);" data-bg="linear-gradient(135deg, #6366f1 0%, #4f46e5 100%)" title="인디고"></span>
                <span class="bg-preset-chip" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);" data-bg="linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%)" title="로얄 블루"></span>
                <span class="bg-preset-chip" style="background: linear-gradient(135deg, #10b981 0%, #047857 100%);" data-bg="linear-gradient(135deg, #10b981 0%, #047857 100%)" title="에메랄드"></span>
              </div>
            </div>
            <div class="form-group">
              <label for="settings-copyright">저작권 문구</label>
              <input type="text" id="settings-copyright" class="admin-input" required>
            </div>
            <div class="form-group">
              <label for="settings-contact">CONTACT 링크 (이메일/링크)</label>
              <input type="text" id="settings-contact" class="admin-input" placeholder="예: mailto:admin@school.com 또는 https://...">
            </div>
            <div class="form-group">
              <label for="settings-password">관리자 비밀번호 변경</label>
              <input type="password" id="settings-password" class="admin-input" placeholder="변경할 새 비밀번호 입력">
            </div>
            <button class="modal-action-btn" id="submit-settings-btn" style="margin-top: 1rem;">설정 저장</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 푸터 -->
  <footer>
    <p id="app-copyright">ⓒ 2026. 창순기획 Co. All rights reserved.</p>
  </footer>

  <!-- Core JavaScript -->
  <script type="module" src="app.js"></script>
</body>
</html>
